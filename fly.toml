app = "chatroomex-realtime"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile.realtime"

[http_service]
  internal_port = 4000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 2

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512
