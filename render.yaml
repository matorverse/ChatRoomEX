services:
  - type: web
    name: chatroomex-web
    env: node
    plan: free
    buildCommand: npm ci --include=dev && npm run prisma:generate && npm run build
    startCommand: NODE_ENV=production npm run prisma:migrate && npm start
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: NEXT_PUBLIC_REALTIME_URL
        fromService:
          type: web
          name: chatroomex-realtime
          envVarKey: RENDER_EXTERNAL_URL

  - type: web
    name: chatroomex-realtime
    env: node
    plan: free
    buildCommand: npm ci --include=dev && npm run prisma:generate
    startCommand: NODE_ENV=production npx tsx realtime/src/server.ts
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: REDIS_URL
        fromService:
          type: redis
          name: chatroomex-redis
          property: connectionString

  - type: redis
    name: chatroomex-redis
    ipAllowList: []
    plan: free
